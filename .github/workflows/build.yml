name: Build and Lint

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm install --prefix website

      - name: Lint
        run: npm run lint

      - name: Type check
        run: cd website && npx tsc -b

      - name: Vite build
        run: |
          cd website
          npx vite build > ../vite-build.log 2>&1 || {
            tail -n 80 ../vite-build.log
            error_tail=$(tail -n 20 ../vite-build.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=Vite build failed::$error_tail"
            exit 1
          }

      - name: Sync dist
        run: node scripts/sync-dist.mjs

      - name: Check build output
        run: |
          if [ -d dist ]; then
            echo "Build succeeded. Output in dist/"
            du -sh dist/
          else
            echo "Build failed - no dist/ directory"
            exit 1
          fi